name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goarch: amd64
            suffix: x86_64
          - goarch: arm64
            suffix: aarch64
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build binary
        run: |
          CGO_ENABLED=0 GOARCH=${{ matrix.goarch }} go build \
            -ldflags "-s -w -X main.version=${{ steps.version.outputs.version }}" \
            -o batctl ./cmd/batctl/

      - name: Create tarball
        run: tar czf batctl-${{ steps.version.outputs.version }}-linux-${{ matrix.suffix }}.tar.gz batctl

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: batctl-linux-${{ matrix.suffix }}
          path: batctl-*-linux-${{ matrix.suffix }}.tar.gz

  release:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git tag -l "v*" --sort=-v:refname | sed -n '2p' || true)
          {
            echo "changelog<<CHANGELOG_EOF"
            if [[ -n "$PREV_TAG" ]]; then
              git log "${PREV_TAG}..HEAD" --pretty=format:"- %s" --no-decorate
            else
              git log --pretty=format:"- %s" --no-decorate
            fi
            echo ""
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "batctl ${{ steps.version.outputs.version }}"
          body: |
            ## Changes

            ${{ steps.changelog.outputs.changelog }}

            ## Installation

            ```bash
            # Quick install (any distro)
            curl -fsSL https://raw.githubusercontent.com/Ooooze/batctl/master/install.sh | sudo bash

            # Arch Linux (AUR)
            yay -S batctl-tui

            # From binary
            tar xzf batctl-*-linux-x86_64.tar.gz
            sudo install -Dm755 batctl /usr/bin/batctl
            ```
          files: batctl-*-linux-*.tar.gz
          generate_release_notes: false
